<!DOCYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Workout Tracker</title>
  <meta name="description" content="Daily workout tracker"/>
  <meta name="theme-color" content="#0d0f12"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Workouts"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#0d0f12; --s1:#111318; --s2:#161b22; --border:#1e2227;
      --green:#4ade80; --blue:#3b82f6; --gold:#f5a623; --white:#e8e8e4;
      --dim:#555566; --dim2:#888899;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bot:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overscroll-behavior:none;}
    body{padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bot) + 58px);}

    /* ── HEADER ── */
    .app-header{background:var(--s2);border-bottom:1px solid var(--border);padding:14px 18px 10px;position:sticky;top:0;z-index:30;}
    .hdr-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:5px;}
    .app-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;line-height:1;}
    .hdr-stats{display:flex;gap:16px;}
    .hstat{text-align:center;}
    .hstat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;}
    .hstat-val.g{color:var(--green);} .hstat-val.o{color:var(--gold);}
    .hstat-lbl{font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}
    .sync-row{display:flex;align-items:center;gap:5px;}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);transition:background .3s;}
    .sync-dot.synced{background:var(--green);}
    .sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite;}
    .sync-dot.error{background:#f87171;}
    .sync-lbl{font-size:9px;color:var(--dim);letter-spacing:.5px;}
    .signout-btn{background:none;border:1px solid var(--border);color:var(--dim);font-size:9px;padding:2px 7px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-left:auto;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ── BOTTOM TABS ── */
    .tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--s2);border-top:1px solid var(--border);display:flex;z-index:30;padding-bottom:var(--safe-bot);}
    .tab{flex:1;padding:8px 4px 6px;text-align:center;cursor:pointer;color:var(--dim2);font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:color .2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
    .tab.active{color:var(--green);}
    .tab-icon{font-size:19px;line-height:1;}

    /* ── SCREENS ── */
    .screen{display:none;}
    .screen.active{display:block;}

    /* ══ CALENDAR ══ */
    .month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;}
    .nav-btn{background:var(--s1);border:1px solid var(--border);color:var(--white);width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .nav-btn:active{background:var(--s2);}
    .month-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}
    .day-headers{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 12px 4px;}
    .day-hdr{text-align:center;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
    .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 12px;}
    .day-cell{background:var(--s1);border:1.5px solid var(--border);border-radius:8px;padding:7px 3px 5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:54px;transition:all .15s;}
    .day-cell.today{border-color:var(--blue);background:#0f1e30;}
    .day-cell.selected{border-color:var(--green);background:#0f2a1a;}
    .day-cell.empty{background:none;border-color:transparent;cursor:default;}
    .day-num{font-size:12px;color:#ccc;}
    .day-cell.today .day-num{color:var(--blue);font-weight:700;}
    .day-bar{width:26px;height:4px;border-radius:2px;background:transparent;transition:background .2s;}
    .day-count{font-size:9px;color:var(--dim);}
    .legend{display:flex;gap:12px;justify-content:center;padding:8px 12px 0;}
    .legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--dim);}
    .legend-bar{width:18px;height:3px;border-radius:2px;}
    .detail-panel{margin:12px 12px 0;background:var(--s1);border:1.5px solid var(--border);border-radius:14px;padding:14px 14px 18px;display:none;}
    .detail-panel.open{display:block;}
    .detail-date{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--green);margin-bottom:12px;}
    .workout-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
    .workout-btn{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;color:var(--white);font-family:'DM Sans',sans-serif;transition:all .15s;text-align:left;}
    .workout-btn.checked{background:#0f2a1a;border-color:var(--green);}
    .workout-btn.checked-other{background:#1a1508;border-color:var(--gold);}
    .w-icon{font-size:18px;flex-shrink:0;}
    .w-label{font-size:12px;color:#888;flex:1;}
    .workout-btn.checked .w-label{color:var(--green);font-weight:600;}
    .workout-btn.checked-other .w-label{color:var(--gold);font-weight:600;}
    .chk{width:16px;height:16px;border-radius:3px;border:1.5px solid #333;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;color:#000;transition:all .15s;}
    .workout-btn.checked .chk{background:var(--green);border:none;}
    .workout-btn.checked-other .chk{background:var(--gold);border:none;}
    .custom-input{margin-top:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:#ccc;padding:8px 12px;font-size:12px;width:100%;outline:none;font-family:'DM Sans',sans-serif;}
    .custom-input:focus{border-color:var(--gold);}

    /* ══ WEEKLY ══ */
    .sec-header{padding:16px 16px 10px;}
    .sec-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}
    .week-nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px 14px;}
    .week-label{font-size:12px;color:var(--dim2);font-weight:500;}
    .ring-wrap{display:flex;flex-direction:column;align-items:center;padding:0 16px 16px;}
    .ring-cont{position:relative;width:130px;height:130px;margin-bottom:8px;}
    .ring-cont svg{transform:rotate(-90deg);}
    .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .ring-num{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;color:var(--green);}
    .ring-sub{font-size:9px;color:var(--dim2);letter-spacing:1px;}
    .ring-label{font-size:10px;color:var(--dim2);letter-spacing:1px;text-transform:uppercase;}
    .week-dots{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 12px 16px;}
    .wd-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .wd-name{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
    .wd-dot{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--dim);}
    .wd-dot.active{background:#0f2a1a;border-color:var(--green);color:var(--green);}
    .wd-dot.today-d{border-color:var(--blue);}
    .wd-sub{font-size:8px;color:var(--dim);}
    .divider{height:1px;background:var(--border);margin:0 16px 16px;}
    .mini-label{padding:0 16px 8px;font-size:9px;color:var(--dim2);letter-spacing:1.5px;text-transform:uppercase;}
    .act-rows{padding:0 16px;display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
    .act-row{display:flex;align-items:center;gap:8px;}
    .act-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
    .act-name{font-size:12px;flex:1;}
    .act-bar-wrap{width:90px;height:5px;background:var(--s2);border-radius:3px;flex-shrink:0;}
    .act-bar{height:5px;border-radius:3px;background:var(--green);}
    .act-ct{font-size:11px;color:var(--dim2);width:22px;text-align:right;}
    .insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 16px 16px;}
    .ins-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px;}
    .ins-lbl{font-size:8px;color:var(--dim2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
    .ins-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;}
    .ins-sub{font-size:10px;color:var(--dim2);margin-top:1px;}

    /* ══ MONTHLY ══ */
    .month-hero{margin:0 12px 14px;background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative;overflow:hidden;}
    .month-hero::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(74,222,128,.07) 0%,transparent 70%);}
    .hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
    .hero-month{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--green);}
    .hero-yr{font-size:10px;color:var(--dim2);margin-top:1px;}
    .hero-grade{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;color:var(--gold);}
    .hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .hs-val{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;}
    .hs-lbl{font-size:8px;color:var(--dim2);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
    .heatmap-wrap{padding:0 12px 14px;}
    .heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
    .hm-hdr{text-align:center;font-size:7px;color:var(--dim);text-transform:uppercase;padding-bottom:3px;}
    .hm-cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;background:var(--s1);color:transparent;border:1px solid var(--border);}
    .hm-cell.empty{background:none;border-color:transparent;}
    .hm-cell.lv1{background:#0f2a1a;border-color:#1a4a2a;color:#4ade8066;}
    .hm-cell.lv2{background:#134020;border-color:#2a6040;color:#4ade80aa;}
    .hm-cell.lv3{background:#1a5a2a;border-color:#3a7a3a;color:var(--green);}
    .hm-cell.lv4{background:#22703a;border-color:var(--green);color:var(--green);font-weight:800;}
    .hm-cell.today-hm{outline:1.5px solid var(--blue);outline-offset:1px;}
    .bc-section{padding:0 16px;margin-bottom:14px;}
    .bc-rows{display:flex;flex-direction:column;gap:9px;}
    .bc-row{display:flex;align-items:center;gap:8px;}
    .bc-icon{font-size:14px;width:20px;text-align:center;}
    .bc-name{font-size:11px;width:104px;flex-shrink:0;}
    .bc-bar-wrap{flex:1;height:7px;background:var(--s2);border-radius:4px;}
    .bc-bar{height:7px;border-radius:4px;}
    .bc-num{font-size:11px;color:var(--dim2);width:24px;text-align:right;}
    .trend-section{padding:0 16px;margin-bottom:14px;}
    .trend-bars{display:flex;align-items:flex-end;gap:5px;height:56px;}
    .trend-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
    .trend-bar{width:100%;border-radius:3px 3px 0 0;background:linear-gradient(to top,#134020,var(--green));min-height:3px;}
    .trend-bar.cur{background:linear-gradient(to top,#1a3a60,var(--blue));}
    .trend-wk{font-size:8px;color:var(--dim);}
    .trend-num{font-size:9px;color:var(--dim2);}
    .sk-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:0 12px;margin-bottom:14px;}
    .sk-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
    .sk-num{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;}
    .sk-num.g{color:var(--green);} .sk-num.o{color:var(--gold);} .sk-num.b{color:var(--blue);}
    .sk-lbl{font-size:8px;color:var(--dim2);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
    .bd-section{padding:0 12px 16px;}
    .bd-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:14px;}
    .bd-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
    .bd-lbl{font-size:8px;color:var(--dim2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
    .bd-date{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);}
    .bd-badge{background:#1a1508;border:1px solid var(--gold);border-radius:6px;padding:4px 8px;font-size:10px;color:var(--gold);font-weight:700;}
    .bd-acts{display:flex;flex-wrap:wrap;gap:5px;}
    .bd-act{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:11px;}

    /* ── AUTH ── */
    #auth-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
    #auth-screen.show{display:flex;}
    .auth-box{width:100%;max-width:340px;background:var(--s1);border:1.5px solid var(--border);border-radius:16px;padding:28px 24px;}
    .auth-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--green);margin-bottom:6px;}
    .auth-sub{font-size:12px;color:var(--dim2);margin-bottom:22px;line-height:1.5;}
    .auth-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--white);padding:11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;transition:border-color .15s;}
    .auth-input:focus{border-color:var(--green);}
    .auth-btn{width:100%;background:var(--green);border:none;border-radius:8px;color:#000;padding:12px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px;}
    .auth-btn:active{opacity:.8;}
    .auth-toggle{text-align:center;margin-top:14px;font-size:12px;color:var(--dim2);}
    .auth-toggle span{color:var(--green);cursor:pointer;text-decoration:underline;}
    .auth-msg{font-size:12px;margin-top:10px;text-align:center;min-height:18px;}
    .auth-msg.err{color:#f87171;} .auth-msg.ok{color:var(--green);}

    /* install banner */
    #install-banner{display:none;margin:10px 12px 0;background:var(--s2);border:1px solid var(--blue);border-radius:10px;padding:10px 14px;font-size:12px;color:#ccc;align-items:center;gap:10px;}
    #install-banner button{background:var(--blue);border:none;color:#fff;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;white-space:nowrap;}
    #install-banner .dismiss{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:0 4px;margin-left:auto;}
  </style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth-screen" class="show">
  <div class="auth-box">
    <div class="auth-title">WORKOUT LOG</div>
    <div class="auth-sub" id="auth-sub">Sign in to sync your workouts across devices.</div>
    <input class="auth-input" id="auth-email" type="email" placeholder="Email address" autocomplete="email"/>
    <input class="auth-input" id="auth-pass" type="password" placeholder="Password" autocomplete="current-password"/>
    <button class="auth-btn" id="auth-submit">Sign In</button>
    <div class="auth-msg" id="auth-msg"></div>
    <div class="auth-toggle">No account? <span id="auth-switch">Create one</span></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app" style="display:none">

  <!-- header -->
  <div class="app-header">
    <div class="hdr-row">
      <div class="app-title">WORKOUT LOG</div>
      <div class="hdr-stats">
        <div class="hstat"><div class="hstat-val o" id="hdr-streak">0d</div><div class="hstat-lbl">Streak</div></div>
        <div class="hstat"><div class="hstat-val g" id="hdr-month">0</div><div class="hstat-lbl">This Month</div></div>
      </div>
    </div>
    <div class="sync-row">
      <div class="sync-dot" id="sync-dot"></div>
      <span class="sync-lbl" id="sync-lbl">connecting...</span>
      <button class="signout-btn" id="signout-btn">Sign Out</button>
    </div>
  </div>

  <div id="install-banner">
    <span>📲 Add to Home Screen for app experience</span>
    <button id="install-btn">Install</button>
    <button class="dismiss" id="dismiss-btn">✕</button>
  </div>

  <!-- ══ CALENDAR SCREEN ══ -->
  <div class="screen active" id="screen-cal">
    <div class="month-nav">
      <button class="nav-btn" id="cal-prev">‹</button>
      <div class="month-name" id="cal-month-name"></div>
      <button class="nav-btn" id="cal-next">›</button>
    </div>
    <div class="day-headers">
      <div class="day-hdr">Sun</div><div class="day-hdr">Mon</div><div class="day-hdr">Tue</div>
      <div class="day-hdr">Wed</div><div class="day-hdr">Thu</div><div class="day-hdr">Fri</div>
      <div class="day-hdr">Sat</div>
    </div>
    <div class="calendar" id="calendar"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-bar" style="background:#3b82f6"></div>1–2</div>
      <div class="legend-item"><div class="legend-bar" style="background:#4ade80"></div>3–4</div>
      <div class="legend-item"><div class="legend-bar" style="background:#f5a623"></div>5+</div>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="detail-date" id="detail-date"></div>
      <div class="workout-grid" id="workout-grid"></div>
      <input class="custom-input" id="custom-input" placeholder='Label for "Other" activity...'/>
    </div>
  </div>

  <!-- ══ WEEKLY SCREEN ══ -->
  <div class="screen" id="screen-weekly">
    <div class="sec-header"><div class="sec-title">WEEKLY RECAP</div></div>
    <div class="week-nav">
      <button class="nav-btn" id="wk-prev">‹</button>
      <div class="week-label" id="wk-label"></div>
      <button class="nav-btn" id="wk-next">›</button>
    </div>
    <div class="ring-wrap">
      <div class="ring-cont">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle cx="65" cy="65" r="54" fill="none" stroke="#1e2430" stroke-width="9"/>
          <circle cx="65" cy="65" r="54" fill="none" stroke="#4ade80" stroke-width="9"
            stroke-linecap="round" stroke-dasharray="339.3" stroke-dashoffset="339.3" id="ring-arc"/>
        </svg>
        <div class="ring-center">
          <div class="ring-num" id="ring-num">0</div>
          <div class="ring-sub" id="ring-sub">/ 0 sessions</div>
        </div>
      </div>
      <div class="ring-label">ACTIVE DAYS</div>
    </div>
    <div class="week-dots" id="week-dots"></div>
    <div class="divider"></div>
    <div class="mini-label">ACTIVITY BREAKDOWN</div>
    <div class="act-rows" id="wk-acts"></div>
    <div class="divider"></div>
    <div class="insight-grid" id="wk-insights"></div>
  </div>

  <!-- ══ MONTHLY SCREEN ══ -->
  <div class="screen" id="screen-monthly">
    <div class="sec-header"><div class="sec-title">MONTHLY REPORT</div></div>
    <div class="month-nav" style="padding-top:0">
      <button class="nav-btn" id="mo-prev">‹</button>
      <div class="month-name" id="mo-name"></div>
      <button class="nav-btn" id="mo-next">›</button>
    </div>
    <div class="m
