<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Workout Tracker</title>
  <meta name="description" content="Daily workout tracker" />
  <meta name="theme-color" content="#0d0f12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workouts" />
  <link rel="manifest" href="manifest.json" />
  <!-- Apple touch icon inline via data URI -->
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0d0f12;
      --surface: #111318;
      --surface2: #161b22;
      --border: #1e2227;
      --green: #4ade80;
      --blue: #3b82f6;
      --gold: #f5a623;
      --white: #e8e8e4;
      --dim: #555566;
      --check-bg: #0a1a10;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
    }
    body {
      padding-top: var(--safe-top);
      padding-bottom: calc(var(--safe-bot) + 16px);
    }

    /* ---- HEADER ---- */
    .header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 3px;
      color: var(--white);
      line-height: 1;
    }
    .stats {
      display: flex;
      gap: 18px;
    }
    .stat { text-align: center; }
    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      line-height: 1;
    }
    .stat-val.green { color: var(--green); }
    .stat-val.gold  { color: var(--gold); }
    .stat-lbl { font-size: 9px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; }

    /* ---- MONTH NAV ---- */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 8px;
    }
    .month-nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--white);
      width: 34px; height: 34px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .month-nav button:active { background: var(--surface2); }
    .month-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 3px;
    }

    /* ---- DAY HEADERS ---- */
    .day-headers {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      padding: 0 12px 4px;
    }
    .day-hdr {
      text-align: center;
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ---- CALENDAR GRID ---- */
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      padding: 0 12px;
    }
    .day-cell {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 4px 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-height: 58px;
      transition: all 0.15s;
      position: relative;
    }
    .day-cell.today { border-color: var(--blue); background: #0f1e30; }
    .day-cell.selected { border-color: var(--green); background: #0f2a1a; }
    .day-cell.empty { background: none; border-color: transparent; cursor: default; }
    .day-num {
      font-size: 13px;
      color: #ccc;
      font-weight: 400;
    }
    .day-cell.today .day-num { color: var(--blue); font-weight: 700; }
    .day-bar {
      width: 28px; height: 4px;
      border-radius: 2px;
      background: transparent;
      transition: background 0.2s;
    }
    .day-count { font-size: 10px; color: var(--dim); }

    /* ---- DETAIL PANEL ---- */
    .detail-panel {
      margin: 14px 12px 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px 16px 20px;
      display: none;
    }
    .detail-panel.open { display: block; }
    .detail-date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      color: var(--green);
      margin-bottom: 14px;
    }
    .workout-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .workout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
    }
    .workout-btn.checked {
      background: #0f2a1a;
      border-color: var(--green);
    }
    .workout-btn.checked-other {
      background: #1a1508;
      border-color: var(--gold);
    }
    .workout-icon { font-size: 20px; flex-shrink: 0; }
    .workout-label {
      font-size: 13px;
      color: #888;
      font-weight: 400;
      flex: 1;
    }
    .workout-btn.checked .workout-label { color: var(--green); font-weight: 600; }
    .workout-btn.checked-other .workout-label { color: var(--gold); font-weight: 600; }
    .check-box {
      width: 18px; height: 18px;
      border-radius: 4px;
      border: 1.5px solid #333;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      color: #000;
      transition: all 0.15s;
    }
    .workout-btn.checked .check-box,
    .workout-btn.checked-other .check-box {
      border: none;
    }
    .workout-btn.checked .check-box { background: var(--green); }
    .workout-btn.checked-other .check-box { background: var(--gold); }

    .custom-input {
      margin-top: 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: #ccc;
      padding: 9px 12px;
      font-size: 13px;
      width: 100%;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.15s;
    }
    .custom-input:focus { border-color: var(--gold); }

    /* ---- LEGEND ---- */
    .legend {
      display: flex;
      gap: 14px;
      justify-content: center;
      padding: 10px 12px 0;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--dim);
    }
    .legend-bar { width: 20px; height: 4px; border-radius: 2px; }

    /* Install banner */
    #install-banner {
      display: none;
      margin: 12px 12px 0;
      background: var(--surface2);
      border: 1px solid var(--blue);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #ccc;
      align-items: center;
      gap: 10px;
    }
    #install-banner button {
      background: var(--blue);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      white-space: nowrap;
    }
    #install-banner .dismiss {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      margin-left: auto;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>WORKOUT LOG</h1>
    <div class="stats">
      <div class="stat">
        <div class="stat-val gold" id="streak-val">0d</div>
        <div class="stat-lbl">Streak</div>
      </div>
      <div class="stat">
        <div class="stat-val green" id="month-val">0</div>
        <div class="stat-lbl">This Month</div>
      </div>
    </div>
  </div>
</div>

<div id="install-banner">
  <span>📲 Add to Home Screen for app experience</span>
  <button id="install-btn">Install</button>
  <button class="dismiss" id="dismiss-btn">✕</button>
</div>

<div class="month-nav">
  <button id="prev-btn">‹</button>
  <div class="month-name" id="month-name"></div>
  <button id="next-btn">›</button>
</div>

<div class="day-headers">
  <div class="day-hdr">Sun</div>
  <div class="day-hdr">Mon</div>
  <div class="day-hdr">Tue</div>
  <div class="day-hdr">Wed</div>
  <div class="day-hdr">Thu</div>
  <div class="day-hdr">Fri</div>
  <div class="day-hdr">Sat</div>
</div>

<div class="calendar" id="calendar"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-bar" style="background:#3b82f6"></div>1–2</div>
  <div class="legend-item"><div class="legend-bar" style="background:#4ade80"></div>3–4</div>
  <div class="legend-item"><div class="legend-bar" style="background:#f5a623"></div>5+</div>
</div>

<div class="detail-panel" id="detail-panel">
  <div class="detail-date" id="detail-date"></div>
  <div class="workout-grid" id="workout-grid"></div>
  <input class="custom-input" id="custom-input" placeholder='Label for "Other" activity...' />
</div>

<script>
const WORKOUTS = [
  { id: "jump",    label: "100 Jump Ropes",  icon: "🪢" },
  { id: "push",    label: "50 Push Ups",     icon: "💪" },
  { id: "run",     label: "Run / KB Walk",   icon: "🏃" },
  { id: "bike",    label: "Bike",            icon: "🚴" },
  { id: "peloton", label: "Peloton",         icon: "🎯" },
  { id: "weights", label: "Weighted Workout",icon: "🏋️" },
  { id: "custom",  label: "Other",           icon: "⚡" },
];

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const STORAGE_KEY = "workout-tracker-v1";

let viewYear, viewMonth, selected = null, customLabel = "";

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
}

let data = loadData();

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}
function getDaysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function getFirstDay(y, m) { return new Date(y, m, 1).getDay(); }

function getCount(y, m, d) {
  const k = dateKey(y, m, d);
  const dd = data[k] || {};
  return Object.values(dd).filter(v => v === true || (typeof v === 'string' && v)).length;
}

function calcStreak() {
  let streak = 0, d = new Date();
  while (true) {
    const k = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
    const dd = data[k] || {};
    if (Object.values(dd).some(v => v)) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function updateStats() {
  const today = new Date();
  const daysInMonth = getDaysInMonth(viewYear, viewMonth);
  let total = 0;
  for (let d = 1; d <= daysInMonth; d++) total += getCount(viewYear, viewMonth, d);
  document.getElementById("streak-val").textContent = calcStreak() + "d";
  document.getElementById("month-val").textContent = total;
}

function barColor(count) {
  if (!count) return "transparent";
  if (count >= 5) return "#f5a623";
  if (count >= 3) return "#4ade80";
  return "#3b82f6";
}

function renderCalendar() {
  const today = new Date();
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";
  document.getElementById("month-name").textContent = `${MONTHS[viewMonth]} ${viewYear}`;

  const firstDay = getFirstDay(viewYear, viewMonth);
  const daysInMonth = getDaysInMonth(viewYear, viewMonth);

  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement("div");
    empty.className = "day-cell empty";
    cal.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
    const isSel = selected && selected.d === d && selected.m === viewMonth && selected.y === viewYear;
    const count = getCount(viewYear, viewMonth, d);

    const cell = document.createElement("div");
    cell.className = "day-cell" + (isToday ? " today" : "") + (isSel ? " selected" : "");

    const num = document.createElement("div");
    num.className = "day-num";
    num.textContent = d;

    const bar = document.createElement("div");
    bar.className = "day-bar";
    bar.style.background = barColor(count);

    cell.appendChild(num);
    cell.appendChild(bar);

    if (count > 0) {
      const cnt = document.createElement("div");
      cnt.className = "day-count";
      cnt.textContent = count;
      cell.appendChild(cnt);
    }

    cell.addEventListener("click", () => {
      if (isSel) { selected = null; }
      else { selected = { y: viewYear, m: viewMonth, d }; }
      renderCalendar();
      renderDetail();
    });

    cal.appendChild(cell);
  }

  updateStats();
}

function renderDetail() {
  const panel = document.getElementById("detail-panel");
  const grid = document.getElementById("workout-grid");
  const input = document.getElementById("custom-input");

  if (!selected) { panel.classList.remove("open"); return; }

  panel.classList.add("open");
  const key = dateKey(selected.y, selected.m, selected.d);
  const dayData = data[key] || {};

  const dateStr = `${MONTHS[selected.m].toUpperCase()} ${selected.d}, ${selected.y}`;
  document.getElementById("detail-date").textContent = dateStr;

  input.value = customLabel;

  grid.innerHTML = "";
  WORKOUTS.forEach(w => {
    const isCustom = w.id === "custom";
    const checked = isCustom ? !!dayData.custom : !!dayData[w.id];
    const label = isCustom && dayData.customLabel ? dayData.customLabel : w.label;

    const btn = document.createElement("button");
    btn.className = "workout-btn" + (checked ? (isCustom ? " checked-other" : " checked") : "");

    btn.innerHTML = `
      <span class="workout-icon">${w.icon}</span>
      <span class="workout-label">${label}</span>
      <div class="check-box">${checked ? "✓" : ""}</div>
    `;

    btn.addEventListener("click", () => {
      const k = dateKey(selected.y, selected.m, selected.d);
      const dd = { ...(data[k] || {}) };
      if (isCustom) {
        if (dd.custom) { delete dd.custom; delete dd.customLabel; }
        else { dd.custom = true; dd.customLabel = input.value || "Other"; }
      } else {
        dd[w.id] = !dd[w.id];
      }
      data[k] = dd;
      saveData(data);
      renderCalendar();
      renderDetail();
    });

    grid.appendChild(btn);
  });

  input.oninput = (e) => { customLabel = e.target.value; };
}

// Month nav
document.getElementById("prev-btn").addEventListener("click", () => {
  if (viewMonth === 0) { viewYear--; viewMonth = 11; }
  else viewMonth--;
  selected = null;
  renderCalendar();
  renderDetail();
});
document.getElementById("next-btn").addEventListener("click", () => {
  if (viewMonth === 11) { viewYear++; viewMonth = 0; }
  else viewMonth++;
  selected = null;
  renderCalendar();
  renderDetail();
});

// Init
const now = new Date();
viewYear = now.getFullYear();
viewMonth = now.getMonth();
renderCalendar();
renderDetail();

// PWA install prompt
let deferredPrompt;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-banner").style.display = "flex";
});
document.getElementById("install-btn").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById("install-banner").style.display = "none";
  }
});
document.getElementById("dismiss-btn").addEventListener("click", () => {
  document.getElementById("install-banner").style.display = "none";
});

// Service Worker registration
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
